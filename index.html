<!-- public/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Mini CRM</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Client Lead Management System</h1>
    </header>

    <main>
        <section class="add-lead-section">
            <h2>Add New Lead</h2>
            <form id="addLeadForm">
                <input type="text" id="name" placeholder="Client Name" required>
                <input type="email" id="email" placeholder="Client Email" required>
                <input type="text" id="source" placeholder="Source (e.g., Website, Facebook)" required>
                <button type="submit">Save Lead</button>
            </form>
        </section>

        <section class="leads-dashboard">
            <h2>Lead Pipeline</h2>
            <div class="table-container">
                <table id="leadsTable">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Source</th>
                            <th>Status</th>
                            <th>Notes & Follow-ups</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="leadsBody">
                        <!-- Leads will be injected here via JavaScript -->
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
